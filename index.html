<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link Vision — Admin Panel</title>
    <script>
      // Run before React — apply correct theme with no flash
      (function() {
        try {
          var raw = localStorage.getItem('link-vision-store');
          if (raw) {
            var parsed = JSON.parse(raw);
            // If user has explicitly set light mode, honour it
            if (parsed && parsed.state && parsed.state.darkMode === false) {
              document.documentElement.classList.remove('dark');
              return;
            }
          }
          // Default: dark mode
          document.documentElement.classList.add('dark');
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
